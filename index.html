sine','Paramétrer un scanner EAN','Réinitialiser un code salarié'].map((x,i)=>`<div class="healthrow"><span>✉</span><p><b>${x}</b><small>${38-i*8} résolutions</small></p><span>↗</span></div>`).join(''))}</div>`}

function config(){return head('SYSTÈME','Réglages, sécurité et connexions.','Le cockpit conserve un journal d’audit et centralise les accès techniques des services Cook Pilot.')+`<div class="grid settings">${[['♜','Sécurité et droits','Rôles internes, accès temporaire client, journal d’audit et validation renforcée.'],['⌁','Connexions applications','Gestion, Human, HACCP et Scan envoient leurs événements vers Command.'],['✦','Supabase & stockage','RLS, buckets privés, migrations et Edge Functions côté serveur.'],['✉','E-mail, paiement et signature','Configurer Resend, Stripe et les fournisseurs de signature et facturation.']].map(x=>`<section class="card setting"><span>${x[0]}</span><h2>${x[1]}</h2><p>${x[2]}</p><button>Configurer ↗</button></section>`).join('')}</div>`}
function render(view='Cockpit'){document.getElementById('crumb').textContent=view;navDraw(view);let out={Cockpit:cockpit,Restaurants:restaurantsView,Support:support,'Agents IA':agents,'Prospects & devis':quotes,Facturation:billing,'Parc matériel':hardware,Journal:journal,Dépenses:expenses,Paramètres:config}[view]();document.getElementById('app').innerHTML=`<section class="view active">${out}</section>`;wire()}
function toast(t){let e=document.getElementById('toast');e.querySelector('span').textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),3000)}function wire(){document.querySelectorAll('[data-action]').forEach(b=>b.onclick=()=>{let a=b.dataset.action;if(a==='go-quotes')return render('Prospects & devis');if(a==='go-restaurants')return render('Restaurants');if(a.startsWith('done-')){tasks.splice(+a.split('-')[1],1);render('Cockpit');return toast('Validation enregistrée.')}toast({publish:'Publication planifiée à 10:00.',improve:'Texte amélioré par Pulse.',procedure:'Procédure envoyée au client.',diagnostic:'Diagnostic ouvert.', 'new-ticket':'Ticket support créé en brouillon.','new-quote':'Nouveau devis créé en brouillon.','send-quote':'Devis PDF premium prêt à envoyer.','new-invoice':'Nouvelle facture créée en brouillon.','add-device':'Matériel ajouté au parc.','scan-invoice':'Capture facture ouverte.', 'add-rest':'Fiche restaurant créée en brouillon.'}[a]||'Action préparée.')})}render();
</script></body></html>
